<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Atividade 3 - Exercícios de Formulários</title>
</head>

<body>

    <h1 class="titulo">Formulários</h1>

    <div class="container">

        <div class="bloco-conteudo">
            <h2 class="subtitulolis">Cadastro</h2>
            <form>
                <label for="nome">Nome Completo</label><br>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required><br><br>

                <label for="email">E-mail</label><br>
                <input type="email" id="email" name="email" placeholder="nome@exemplo.com" required><br><br>

                <label for="senha">Senha</label><br>
                <input type="password" id="senha" name="senha" placeholder="Crie uma senha segura" required><br><br>

                <button type="submit">Cadastrar Usuário</button>
            </form>
        </div>

        <div class="bloco-conteudo">
            <h2 class="subtitulolis">Tarefa</h2>
            <form>
                <label for="titulo-tarefa">Título da Tarefa</label><br>
                <input type="text" id="titulo-tarefa" name="titulo-tarefa" placeholder="Escreva uma tarefa"
                    required><br><br>

                <label for="descricao-tarefa">Descrição</label><br>
                <textarea id="descricao-tarefa" name="descricao-tarefa" rows="3"
                    placeholder="Detalhes sobre a tarefa"></textarea><br><br>

                <label for="prioridade">Prioridade</label><br>
                <select id="prioridade" name="prioridade">
                    <option value="baixa">Baixa</option>
                    <option value="media">Média</option>
                    <option value="alta">Alta</option>
                </select><br><br>

                <button type="submit">Criar Tarefa</button>
            </form>
        </div>

        <div class="bloco-conteudo">
            <h2 class="subtitulolis">Reserva</h2>
            <form>
                <label for="nome-aluno">Nome do Solicitante</label><br>
                <input type="text" id="nome-aluno" name="nome-aluno" placeholder="Seu nome" required><br><br>

                <label for="turma">Turma</label><br>
                <input type="text" id="turma" name="turma" placeholder="Escreva sua turma" required><br><br>

                <label for="horario">Horário da Reserva</label><br>
                <input type="time" id="horario" name="horario" required><br><br>

                <button type="submit">Reservar Espaço</button>
            </form>
        </div>

        <div class="blocobaixo">
            <div class="bloco-conteudo">
                <h2 class="subtitulolis">Login</h2>
                <form>
                    <label for="login-email">E-mail</label><br>
                    <input type="email" id="login-email" name="login-email" placeholder="Digite seu e-mail"
                        required><br><br>

                    <label for="login-senha">Senha</label><br>
                    <input type="password" id="login-senha" name="login-senha" placeholder="Digite sua senha"
                        required><br><br>

                    <button type="submit">Entrar</button>
                </form>
            </div>

            <div class="bloco-conteudo">
                <h2 class="subtitulolis">Contato</h2>
                <form>
                    <label for="assunto">Assunto</label><br>
                    <input type="text" id="assunto" name="assunto" placeholder="Escreva o que deve ser contatado"
                        required><br><br>

                    <label for="mensagem">Mensagem</label><br>
                    <textarea id="mensagem" name="mensagem" rows="4"
                        placeholder="Digite sua mensagem para a coordenação..." required></textarea><br><br>

                    <button type="submit">Enviar Mensagem</button>
                </form>
            </div>
        </div>

    </div>

    <div class="botao">
        <a href="../Atividade 1/index.html">
        <button class="proximapag">Voltar ao início</button>
        </a>
    </div>

</body>

</html>
